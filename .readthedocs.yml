version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  apt_packages:
    - doxygen
    - cmake
    - ninja-build

  commands:
    - cmake -S . -B build -G Ninja
        -DPOLYFIT_GENERATE_DOCS=ON
        -DPOLYFIT_BUILD_TESTS=OFF
        -DPOLYFIT_BUILD_EXAMPLES=OFF
    - cmake --build build --target doxygen -- -j4

sphinx:
  configuration: docs/conf.py

python:
  install:
    - requirements: docs/requirements.txt
